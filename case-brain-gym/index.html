<!doctype html>
<html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Coral Mission</title><style>
:root{--o:#073b4c;--sea:#0d6e7c;--mint:#b8f2e6;--sand:#fff5dc;--bg:#eff8f7;--ink:#18313a;--mut:#61757c;--line:#dbe8e7;--good:#16815c;--bad:#a94545}*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#dff5f2,#f8fcfb 55%);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,'Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif}.app{max-width:760px;margin:auto;padding:18px 16px 48px}.top{display:flex;justify-content:space-between;align-items:center;font-weight:900;font-size:14px}.hero{margin-top:14px;background:linear-gradient(135deg,#073b4c,#0d6e7c);color:#fff;padding:23px;border-radius:24px;overflow:hidden;position:relative}.hero:after{content:'🪸';position:absolute;right:18px;bottom:-18px;font-size:115px;opacity:.22}.hero small{font-weight:900;letter-spacing:.1em;opacity:.76}.hero h1{font-size:27px;letter-spacing:-.05em;line-height:1.25;margin:8px 0}.hero p{font-size:14px;line-height:1.6;margin:0;opacity:.9}.clock{margin-top:15px;display:inline-block;background:#ffffff20;padding:9px 11px;border-radius:12px;font-size:13px;font-weight:900}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin:15px 0}.stat{background:#fff;border:1px solid var(--line);border-radius:14px;padding:10px}.stat b{display:block;font-size:19px}.stat span{display:block;font-size:10px;font-weight:750;color:var(--mut);margin-top:3px}.bar{height:5px;background:#eaf0ef;border-radius:99px;margin-top:7px;overflow:hidden}.fill{height:100%;border-radius:99px;background:var(--sea);transition:.35s}.card{background:#fff;border:1px solid var(--line);border-radius:22px;padding:18px;box-shadow:0 8px 25px rgba(22,74,79,.06)}.stage{display:flex;justify-content:space-between;align-items:center;gap:8px}.tag{background:#e4f5f2;color:#08717a;padding:6px 9px;border-radius:999px;font-weight:900;font-size:11px}.step{font-size:12px;color:var(--mut);font-weight:800}.brief{margin:14px 0 12px;background:#f5fbfa;border-left:4px solid #55c8ba;border-radius:9px;padding:10px 12px;font-size:13px;line-height:1.55}.q{font-size:18px;line-height:1.55;font-weight:850;margin:10px 0 13px}.choice{width:100%;display:block;text-align:left;background:#fff;border:1.5px solid var(--line);border-radius:14px;padding:13px;margin:8px 0;font-size:14px;line-height:1.5}.choice:hover{border-color:#62bdb5;background:#fbfffe}.choice.selected{border-color:var(--sea);background:#eaf9f7}.choice.disabled{opacity:.65}.act{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:13px}.hint{font-size:12px;color:var(--mut);line-height:1.45}.btn{background:var(--o);border:0;color:#fff;font-weight:900;padding:11px 14px;border-radius:12px}.feedback{display:none;margin-top:14px;border-radius:14px;padding:13px;font-size:13px;line-height:1.62}.feedback.show{display:block}.feedback.good{background:#eaf9f2;color:#0e6a4b}.feedback.mid{background:#fff8e7;color:#7d5c13}.feedback.bad{background:#fff0f0;color:#933c3c}.next{display:none;margin-top:10px;border:0;border-radius:12px;padding:11px 14px;background:#e3f5f2;color:#08717a;font-weight:900}.next.show{display:inline-block}.end{display:none;text-align:center;padding:16px}.end h2{margin:5px 0 8px}.result{background:var(--sand);border-radius:14px;padding:12px;margin:14px 0;font-size:14px;line-height:1.6}.restart{border:0;background:var(--o);color:#fff;padding:12px 16px;border-radius:13px;font-weight:900}@media(max-width:520px){.stats{grid-template-columns:repeat(2,1fr)}.hero h1{font-size:24px}}
</style></head><body><div class="app"><div class="top"><div>🪸 Coral Mission</div><div id="timer">T−72h</div></div><section class="hero"><small>NARU ISLANDS · SPAWNING WINDOW</small><h1>72時間後、サンゴは産卵する。<br>間に合うかは、あなたの判断次第。</h1><p>藻類・水質・魚・地域社会。すべてを救う時間はない。<br>今この瞬間に、最も効く一手を選ぶ。</p><div class="clock">Mission score: <span id="score">0</span> / 100</div></section><section class="stats"><div class="stat"><b id="spawnN">50</b><span>産卵成功</span><div class="bar"><div class="fill" id="spawnB"></div></div></div><div class="stat"><b id="teamN">50</b><span>チーム信頼</span><div class="bar"><div class="fill" id="teamB"></div></div></div><div class="stat"><b id="commN">50</b><span>地域協力</span><div class="bar"><div class="fill" id="commB"></div></div></div><div class="stat"><b id="longN">50</b><span>長期回復</span><div class="bar"><div class="fill" id="longB"></div></div></div></section><section class="card" id="game"><div class="stage"><span class="tag" id="tag">優先順位</span><span class="step" id="step"></span></div><div class="brief" id="brief"></div><div class="q" id="q"></div><div id="choices"></div><div class="act"><span class="hint" id="hint"></span><button class="btn" id="decide" onclick="decide()">決定する</button></div><div class="feedback" id="feedback"></div><button class="next" id="next" onclick="nextStep()">次の局面へ →</button></section><section class="card end" id="end"><div class="tag">MISSION COMPLETE</div><h2 id="title"></h2><div class="result" id="summary"></div><button class="restart" onclick="restart()">もう一度ミッションへ</button></section></div><script>
const scenes=[
{tag:'優先順位',brief:'産卵まで72時間。作業は「藻類除去・水質改善・漁業者との連携」。チームはまだ相互の考え方を十分に理解していない。',q:'最初に何へ時間を使う？',hint:'緊急時でも、いきなり手を動かす前に「成功条件」と「協力の障害」を押さえる。',a:[['サンゴの産卵に必要な条件と、新しい藻類データを短時間で確認する。',[[8,0,0,4]],'good','産卵の成功条件と脅威を押さえる判断。次の行動の質が上がる。'],['まず全員と丁寧に信頼関係を築く。',[[0,10,0,0]],'mid','チーム信頼には効くが、72時間という制約下では初動としては広すぎる。'],['全タスクを同時に開始するよう指示する。',[[2,-5,0,0]],'bad','勢いは出るが、優先順位がないため資源が散り、意思決定が遅くなる。']]},
{tag:'チームの停滞',brief:'東海岸で深刻な藻類大量発生の予測が届く。チームは不安になり、議論が止まっている。',q:'チームをどう動かす？',hint:'不安を無視すると停滞する。だが、共感だけでも産卵は待ってくれない。',a:[['リスクを率直に認め、短時間で「影響・選択肢・担当」を話し合う場を作る。',[[5,9,0,0]],'good','安全に懸念を出しつつ、次の意思決定へ進める。信頼と実行を両立する。'],['今のタスクを完了してから、藻類問題を検討するよう指示する。',[[0,-6,0,0]],'bad','予定を守る姿勢はあるが、新情報が計画の前提を崩している。先送りは危険。'],['全員に自由にアイデアを出させ、結論は後で考える。',[[0,3,0,0]],'mid','多様な意見は得られるが、時間制約下で議論が断片化しやすい。']]},
{tag:'漁業者との合意',brief:'藻類を抑える魚を守るには、重要海域での漁獲制限が必要。船長たちは収入減を強く懸念している。',q:'最も実行可能な交渉は？',hint:'正しさの説明だけでは協力は得られない。相手の失うものを、代替価値に変える。',a:[['重要海域の漁獲を避ける代わりに、船を藻類監視に雇用し、限定操業の妥協案を設計する。',[[6,0,13,4]],'good','生態系の保護と所得の両方に手を打つ。完全解ではないが、実行可能な合意を作れる。'],['産卵の緊急性と科学データを示し、今すぐ漁を止めるよう求める。',[[5,0,-14,0]],'bad','正論でも、一方的な負担は反発を生む。協力が崩れると監視・遵守も続かない。'],['別の海岸で漁を続けるよう提案する。',[[0,0,2,0]],'mid','影響範囲や代替地の漁況を確認していない。良い意図でも、根拠のない移転案。']]},
{tag:'水質と即応',brief:'高い栄養塩・堆積物・汚染物質が検出された。原因は一つに絞れず、藻類は局所的に急増している。',q:'産卵前の次の一手は？',hint:'根本原因の特定には時間がかかる。短期の被害軽減と、判断を更新する情報を両立させる。',a:[['センサーで重点海域を監視しつつ、最悪地点にはダイバーと一時的な堆積物バリアを投入する。',[[15,0,0,6]],'good','原因不明でも、守る場所を絞り、時間を稼ぎながらデータで更新できる。'],['データ分析の専門家を増やし、原因が確定するまで対策を保留する。',[[0,0,0,5]],'bad','分析は重要だが、産卵までの時間を失う。今は不確実性の下で被害を減らす必要がある。'],['ダイバーに全海域の藻類除去を続けさせる。',[[5,0,0,0]],'mid','局所清掃は有効だが、全域対応は資源不足。守る定着エリアを絞るべき。']]},
{tag:'計画の再設計',brief:'主要定着エリアの一部は既に藻類に覆われ、すべてを清掃する時間がない。計画の前提が崩れた。',q:'何を優先する？',hint:'想定が外れた時は、計画を守るのでなく「成功確率を最大化する対象」へ資源を再配分する。',a:[['定着エリアを緊急評価し、救える場所を優先順位化。手順をチームで短時間レビューして実行する。',[[14,8,0,2]],'good','全救済を諦め、最も成功確率の高い場所へ集中する。構造化と巻き込みを両立。'],['全員で自由なアイデア出しを行い、新しい解決策を探す。',[[0,5,0,0]],'mid','知恵は得られるが、局面は発散より収束が必要。'],['従来通りの計画を一歩ずつ続ける。',[[0,0,0,0]],'bad','前提が崩れている以上、慎重さが実質的な放置になる。']]},
{tag:'長期回復と地域',brief:'産卵期後も、栄養塩・汚染物質の発生源を特定し、地域と持続的な回復策を作る必要がある。住民向け説明も迫っている。',q:'最も筋のよい次の設計は？',hint:'短期対応で得た信頼とデータを、地域が続けられる仕組みに変える。',a:[['周辺活動・汚染源を調査し、漁業・水質・生息地ごとに担当を置く。住民向けには専門用語を減らし、成果と次の協力を一つの物語で伝える。',[[0,5,11,16]],'good','原因調査、役割分担、住民との共有を接続し、単発の救助を回復の仕組みに変える。'],['全員で詳細な長期計画を完成させてから、地域へ説明する。',[[0,0,0,7]],'mid','体系性はあるが、地域の不安と協力を得る機会を遅らせる。'],['チームの努力を称え、前向きな雰囲気で説明会に臨む。',[[0,8,2,0]],'bad','士気は重要だが、地域が必要とするのは分かりやすい行動・根拠・参加方法。']]}
];let i=0,chosen=null,s={spawn:50,team:50,comm:50,long:50};function clamp(v){return Math.max(0,Math.min(100,v))}function paint(){['spawn','team','comm','long'].forEach(k=>{document.getElementById(k+'N').textContent=s[k];document.getElementById(k+'B').style.width=s[k]+'%'});document.getElementById('score').textContent=Math.round((s.spawn+s.team+s.comm+s.long)/4)}function render(){let x=scenes[i];chosen=null;document.getElementById('tag').textContent=x.tag;document.getElementById('step').textContent='局面 '+(i+1)+' / '+scenes.length;document.getElementById('brief').textContent=x.brief;document.getElementById('q').textContent=x.q;document.getElementById('hint').textContent=x.hint;document.getElementById('feedback').className='feedback';document.getElementById('next').className='next';document.getElementById('decide').disabled=false;document.getElementById('timer').textContent='T−'+(72-i*12)+'h';let box=document.getElementById('choices');box.innerHTML='';x.a.forEach((v,n)=>{let b=document.createElement('button');b.className='choice';b.innerHTML='<b>'+(n+1)+'. </b>'+v[0];b.onclick=()=>{document.querySelectorAll('.choice').forEach(e=>e.className='choice');b.className='choice selected';chosen=n};box.appendChild(b)})}function decide(){if(chosen===null){alert('一つ選ぼう。判断を保留しても、産卵期は保留してくれない。');return}let x=scenes[i],v=x.a[chosen],d=v[1][0];['spawn','team','comm','long'].forEach((k,n)=>s[k]=clamp(s[k]+d[n]));paint();document.querySelectorAll('.choice').forEach((e,n)=>{e.classList.add('disabled');if(n===chosen)e.classList.add(v[2]==='good'?'correct':v[2]==='bad'?'wrong':'selected')});let fb=document.getElementById('feedback');fb.className='feedback show '+(v[2]==='good'?'good':v[2]==='bad'?'bad':'mid');fb.innerHTML='<b>'+({good:'筋がよい判断。',mid:'悪くないが、優先順位に課題。',bad:'リスクが大きい判断。'})[v[2]]+'</b> '+v[3];document.getElementById('decide').disabled=true;document.getElementById('next').className='next show'}function nextStep(){i++;if(i>=scenes.length){finish()}else render()}function finish(){document.getElementById('game').style.display='none';document.getElementById('end').style.display='block';let total=Math.round((s.spawn+s.team+s.comm+s.long)/4),title=total>=75?'産卵の希望を残したリーダー':total>=55?'厳しい海で、前進を作った調整者':'善意はあったが、焦点を失った指揮官';document.getElementById('title').textContent=title;document.getElementById('summary').innerHTML='最終スコア <b>'+total+' / 100</b><br><br>産卵成功 '+s.spawn+' ｜ チーム信頼 '+s.team+'<br>地域協力 '+s.comm+' ｜ 長期回復 '+s.long+'<br><br>このミッションの核は、すべてを解くことではなく、<b>時間制約の中で、短期の産卵成功と長期の回復をつなぐ判断をすること</b>。';document.getElementById('timer').textContent='MISSION END'}function restart(){i=0;s={spawn:50,team:50,comm:50,long:50};document.getElementById('game').style.display='block';document.getElementById('end').style.display='none';paint();render()}paint();render();
</script></body></html>
