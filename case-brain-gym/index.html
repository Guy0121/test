<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Nestlé Growth Case Gym</title><style>:root{--p:#6454df;--bg:#f5f6fb;--ink:#202534;--mut:#70788a;--line:#e4e7ef;--ok:#138a57;--bad:#bd4b4b}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,'Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif}.app{max-width:800px;margin:auto;padding:20px 16px 48px}.top{display:flex;justify-content:space-between;align-items:center;font-weight:900;margin-bottom:14px}.hero{background:linear-gradient(135deg,#4835be,#7767ed);color:white;padding:24px;border-radius:22px}.hero small{font-weight:800;opacity:.8;letter-spacing:.09em}.hero h1{font-size:27px;line-height:1.3;letter-spacing:-.05em;margin:7px 0}.hero p{margin:0;line-height:1.6;font-size:14px;opacity:.9}.goal{margin-top:15px;background:#ffffff22;border-radius:13px;padding:10px;font-size:13px;font-weight:800}.tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin:16px 0}.tab{border:1px solid var(--line);background:white;border-radius:14px;padding:11px 6px;font-weight:850;font-size:13px}.tab.active{border-color:var(--p);background:#efedff;color:var(--p)}.card{background:white;border:1px solid var(--line);border-radius:21px;padding:19px}.head{display:flex;justify-content:space-between;gap:8px;align-items:center}.badge{color:var(--p);background:#efedff;border-radius:999px;padding:6px 9px;font-size:11px;font-weight:900}.num{font-size:12px;font-weight:800;color:var(--mut)}.q{font-size:18px;font-weight:850;line-height:1.55;margin:15px 0}.context{background:#faf9ff;border-left:4px solid #b8afff;padding:10px 12px;font-size:13px;color:#4e5360;line-height:1.55;margin:0 0 13px}.choice{width:100%;display:block;text-align:left;border:1.5px solid var(--line);background:white;border-radius:13px;padding:12px;margin:8px 0;font-size:14px;line-height:1.5}.choice.selected{border-color:var(--p);background:#f3f1ff}.choice.correct{border-color:#32a972;background:#ecfaf3}.choice.wrong{border-color:#e58484;background:#fff1f1}.act{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:13px}.hint{font-size:12px;line-height:1.45;color:var(--mut)}button{cursor:pointer}.btn{border:0;background:var(--ink);color:white;border-radius:12px;padding:11px 15px;font-weight:900}.feedback{display:none;margin-top:13px;padding:12px;border-radius:13px;font-size:13px;line-height:1.6}.feedback.show{display:block}.good{background:#ecfaf3;color:#087147}.bad{background:#fff0f0;color:#963838}.next{margin-top:10px;border:0;background:#efedff;color:var(--p);font-weight:900;border-radius:12px;padding:10px 13px;display:none}.next.show{display:inline-block}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-top:16px}.stat{background:white;border:1px solid var(--line);border-radius:14px;padding:11px}.stat b{display:block;font-size:20px}.stat span{font-size:10px;color:var(--mut);font-weight:750}@media(max-width:520px){.tabs{grid-template-columns:repeat(2,1fr)}.stats{grid-template-columns:repeat(2,1fr)}.hero h1{font-size:24px}}</style></head><body><div class="app"><div class="top"><div>Case Brain Gym</div><div>🔥 <span id="total">0</span> lessons</div></div><section class="hero"><small>NESTLÉ · GROWTH RECOVERY</small><h1>守りの利益改善から、<br>再び成長へ戻す。</h1><p>目標は年率3〜4%、来年の売上増2〜4Bドル。<br>原因→優先順位→売上ブリッジまで考える。</p><div class="goal">今日の狙い：正解当てではなく、「次に何を見て、何を捨てるか」を鍛える。</div></section><div class="tabs"><button class="tab active" data="cut" onclick="modeSet('cut',this)">🧩 分解</button><button class="tab" data="dig" onclick="modeSet('dig',this)">🔍 深掘り</button><button class="tab" data="create" onclick="modeSet('create',this)">💡 施策</button><button class="tab" data="synth" onclick="modeSet('synth',this)">🎯 提言</button></div><section class="card"><div class="head"><span class="badge" id="badge"></span><span class="num" id="num"></span></div><div class="context" id="context"></div><div class="q" id="q"></div><div id="choices"></div><div class="act"><span class="hint" id="hint"></span><button class="btn" id="answer" onclick="answer()">回答する</button></div><div class="feedback" id="feedback"></div><button class="next" id="next" onclick="nextQ()">次の問題 →</button></section><section class="stats"><div class="stat"><b id="cutS">0</b><span>分解力</span></div><div class="stat"><b id="digS">0</b><span>深掘り力</span></div><div class="stat"><b id="createS">0</b><span>施策力</span></div><div class="stat"><b id="synthS">0</b><span>提言力</span></div></section></div><script>var bank={cut:[{c:'目標：年率3〜4%、来年2〜4Bドルの増収。利益率は既に改善している。',q:'最初の論点整理として最も筋がよいのは？',a:['①既存売上を戻せるか ②新しい成長源を作れるか ③短期間で実行できるか','価格・広告・SNS・買収・海外展開を同時に全て検討する','Organic growthとInorganic growthだけに分ける','利益率をさらに上げる方法から検討する'],ok:0,h:'目標額が大きいので、施策の網羅より「売上回復・成長源・実行」の優先順が必要。',f:'正解。既存事業、成長源、実行可能性に分けると、原因から提言まで一直線につながる。買収は選択肢の一つであって、最初の分解軸にはしない。'},{c:'Nestléは競合より売上成長が弱く、直近では売上が減少。',q:'市場全体かNestlé固有かを最短で切り分けるため、最も有効な比較は？',a:['競合との売上成長・市場シェア推移','Nestlé社員の満足度','水事業の世界市場規模','CEO就任後の株価のみ'],ok:0,h:'外部環境か自社固有かは、同じ市場にいる競合比較で見る。',f:'正解。競合が伸びていれば、外部環境だけでは説明できず、価格・商品・投資・実行の自社課題を優先して掘れる。'}],dig:[{c:'マーケティング投資を抑制し、新商品ローンチ期間は過去より25〜40%長期化。さらに値上げ後、PLが伸長。',q:'次に確認すべきデータとして最も意思決定に効くものは？',a:['カテゴリー・地域・チャネル別の価格差、数量、シェア、販促ROI、新商品投入状況','ブランドロゴの好感度だけ','全社平均の広告費だけ','競合CEOのインタビュー'],ok:0,h:'価格だけと断定せず、どこで何が落ちたかを一気に特定するデータが必要。',f:'正解。価格、価値訴求、棚の露出、欠品、新商品不足を切り分けるには、カテゴリー×地域×チャネルで数量とシェアまで見る必要がある。'},{c:'2017〜2023年、Nestléは横ばい〜減少。一方でPepsiCo等は伸長し、特に2021年以降に差が拡大。',q:'図表からの最も強い示唆は？',a:['成長鈍化は市場全体よりNestlé固有の問題の可能性が高い','食品市場全体が縮小している','買収を急ぐべきだ','利益率を下げるべきだ'],ok:0,h:'結論→根拠→仮説→次の確認、の順で読む。',f:'正解。競合が伸びている以上、外部環境のせいにできない。価格設定、投資、商品投入スピードが競合比で劣後していないかを検証する。'}],create:[{c:'来年2〜4Bドルの増収が必要。PL流出、マーケ投資減、新商品遅延が確認されている。',q:'短期・中期を両立する優先施策の組み合わせは？',a:['主力カテゴリーで低価格パック・容量設計・販促を見直し、成長ブランドへ広告集中、新商品開発を短縮','全商品を値下げし、同時に大規模買収する','水事業を最優先で倍増させる','全ブランドに均等に広告を配る'],ok:0,h:'「原因に直結」「2〜4Bに寄与」「利益率を壊しすぎない」が判断軸。',f:'正解。PL流出には価格・容量・販促、投資不足には広告再配分、商品遅延には開発短縮で対応する。全商品値下げや均等投資は、利益と集中を失いやすい。'},{c:'ボトルウォーター事業の売上は3.2Bドル。供給問題・リコールがあり、全社では2〜4Bドルの増収目標。',q:'水事業への短期方針として最も筋がよいのは？',a:['成長の主役には置かず、立て直し・縮小・売却を判断し、主力ブランドへ投資を優先','市場が大きいので、即座に投資を倍増','売上3.2Bなので全社目標を十分に担える','ブランドイメージだけを理由に即売却'],ok:0,h:'市場規模ではなく、目標への寄与・競争力・基礎体力を見る。',f:'正解。仮に水事業を10%伸ばしても増収は約0.32Bドル。供給・品質課題もあり、短期2〜4Bの主軸にはなりにくい。'}],synth:[{c:'原因：PL流出、広告投資減、新商品遅延。目標：来年2〜4Bドル増収、年率3〜4%成長。',q:'CEOへの最終提言として最も完成度が高いものは？',a:['主力カテゴリーで数量・シェア回復を優先し、価格・容量・販促をテスト。成長ブランドへ広告集中し、開発期間を短縮。90日でパイロット、6か月で数量・シェア確認、12か月で3〜4%成長を目指す。','水事業を売却し、残りは各事業に任せる。','広告を増やし、様子を見る。','競合を買収して来年の成長を作る。'],ok:0,h:'提言は「結論→根拠→具体施策→数字→リスク/実行」の形にする。',f:'正解。原因に打ち手が接続し、短期のテストと中期の開発改革があり、実行の節目も置けている。これが“アイデア”ではなく経営提言になる。'},{c:'従業員27万人のNestléで、成長転換を速く実行したい。',q:'最も実行力の高い変革設計は？',a:['CEO直属の変革チームを置き、優先カテゴリー・地域・責任者・KPIを明確化。90日パイロット→成功施策だけ横展開','全社員へ一律に売上目標を通達する','成果が出ない部門を直ちに罰する','全社で半年間かけて詳細計画を完成させる'],ok:0,h:'大企業では、誰が・どこで・何を・いつまでに動かすかが戦略の一部。',f:'正解。優先領域、責任者、KPI、意思決定周期を固定し、小さく検証して広げる。恐怖や全社一斉展開は反発と遅延を生みやすい。'}]};var mode='cut',idx={cut:0,dig:0,create:0,synth:0},sel=null,total=0,score={cut:0,dig:0,create:0,synth:0};function cur(){return bank[mode][idx[mode]%bank[mode].length]}function render(){var x=cur();sel=null;document.getElementById('badge').textContent=({cut:'🧩 分解',dig:'🔍 深掘り',create:'💡 施策',synth:'🎯 提言'})[mode];document.getElementById('num').textContent='問題 '+(idx[mode]%bank[mode].length+1)+' / '+bank[mode].length;document.getElementById('context').textContent=x.c;document.getElementById('q').textContent=x.q;document.getElementById('hint').textContent=x.h;document.getElementById('feedback').className='feedback';document.getElementById('next').className='next';document.getElementById('answer').disabled=false;var box=document.getElementById('choices');box.innerHTML='';x.a.forEach(function(t,i){var b=document.createElement('button');b.className='choice';b.innerHTML='<b>'+String.fromCharCode(65+i)+'. </b>'+t;b.onclick=function(){document.querySelectorAll('.choice').forEach(function(e){e.className='choice'});b.className='choice selected';sel=i};box.appendChild(b)})}function modeSet(m,e){mode=m;document.querySelectorAll('.tab').forEach(function(b){b.className='tab'});e.className='tab active';render()}function answer(){if(sel===null){alert('選択肢を選ぼう。仮説は自由でも、意思決定は選ぶところから。');return}var x=cur(),cs=document.querySelectorAll('.choice'),fb=document.getElementById('feedback');cs[x.ok].classList.add('correct');if(sel===x.ok){total++;score[mode]+=10;document.getElementById('total').textContent=total;document.getElementById(mode+'S').textContent=score[mode];fb.className='feedback show good';fb.innerHTML='<b>正解。</b> '+x.f;document.getElementById('answer').disabled=true}else{cs[sel].classList.add('wrong');fb.className='feedback show bad';fb.innerHTML='<b>惜しい。</b> '+x.f}document.getElementById('next').className='next show'}function nextQ(){idx[mode]++;render()}render();</script></body></html>
